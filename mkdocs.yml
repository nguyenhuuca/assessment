site_name: Funny Movies - Architecture Docs
site_description: Architecture documentation for the Funny Movies video streaming platform
site_author: nguyenhuuca
repo_url: https://github.com/nguyenhuuca/assessment
repo_name: nguyenhuuca/assessment

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md

  - Architecture:
      - Overview: Video Streaming System Architecture.md
      - Sequence Diagram: Sequence-Diagram.md
      - Performance Review: performance-review.md

  - ADR:
      - Template: adr/0000-template.md
      - 0001 - Use RDBMS: adr/0001-use-relational-database.md
      - 0002 - Backend Architecture: adr/0002-backend-architecture.md
      - 0003 - Cache Strategy: adr/0003-use-cache.md
      - 0004 - Frontend Structure: adr/0004-frontend-structure.md
      - 0005 - LRU Video Cache: adr/0005-use_lru_cache_video_streaming.md
      - 0006 - HLS Video Streaming: adr/0006-hls-video-streaming.md
      - 0007 - Admin Dashboard: adr/0007-admin-dashboard.md
      - 0008 - React Migration: adr/0008-react-migration.md
      - 0009 - Unified Video List API: adr/0009-unified-video-list-api.md
      - Binary Search: adr/apr_binary_search.md

  - PRD:
      - Hot Video Priority: prd/PRD-hot-video-priority.md
      - React Migration: prd/PRD-react-migration.md

  - Plans:
      - HLS Migration: plans/plan-hls-migration.md
      - React Migration: plans/plan-react-migration.md
      - Admin Dashboard: plans/plan-admin-dashboard.md
      - Permissions (Bitwise): plans/plan-permissions-bitwise.md
      - Hot Score Migration: plans/plan-vid2-hot-score-migration.md
      - Plan A (File-based Hooks): plans/plan-a-file-based-hooks.md
      - Plan B (Direct CLI Spawn): plans/plan-b-direct-cli-spawn.md

  - Reports:
      - System Health 2026-05-30: system_health_report_2026-05-30.md
      - System Health 2026-02-06: system_health_report_2026-02-06.md
      - Architecture Quality 2025-07-13 EN: architecture_quality_report_2025-07-13_EN.md
      - Architecture Quality 2025-07-13 VN: architecture_quality_report_2025-07-13._VN.md
      - Architecture Quality 2025-07-05: architecture_quality_report_2025-07-05.md

  - Guides:
      - Trello Setup: trello-setup-guide.md
      - Trello Board Status: trello-board-status.md
